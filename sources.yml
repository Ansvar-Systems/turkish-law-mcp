# Notes:
# - Turkey is an EU candidate country; its data protection legislation (KVKK, Law No. 6698)
#   is modeled on the EU Data Protection Directive 95/46/EC rather than the GDPR,
#   though Turkey is in ongoing adequacy negotiations with the EU
# - The KVKK (enacted 2016) is Turkey's first comprehensive data protection law;
#   it established the KVKK Kurumu (Personal Data Protection Authority) as the
#   independent supervisory authority
# - Turkey's Constitution Art. 20 explicitly protects the right to privacy
#   (ozel hayatin gizliligi) and was amended in 2010 to add specific provisions
#   on personal data protection
# - The TCK (Turk Ceza Kanunu / Turkish Criminal Code) contains comprehensive
#   cybercrime provisions in articles 243 (unauthorized access to information
#   systems), 244 (damaging/altering data), 245 (misuse of bank/credit cards),
#   and 246 (related provisions)
# - Law No. 5651 (2007) regulates content on the internet and is Turkey's primary
#   internet regulation law; it has been significantly amended multiple times and
#   is internationally notable for its content blocking provisions
# - The TTK (Turk Ticaret Kanunu, Law No. 6102, 2012) is Turkey's modern Commercial
#   Code, replacing the 1956 code, and includes provisions on electronic commerce,
#   corporate governance, and commercial registers
# - Law No. 6563 (2014) is Turkey's Electronic Commerce Law, regulating
#   commercial electronic messages, service provider obligations, and e-commerce
# - BTK (Bilgi Teknolojileri ve Iletisim Kurumu / Information and Communication
#   Technologies Authority) is the telecommunications regulator
# - mevzuat.gov.tr provides structured HTML with legislation organized by type
#   (kanun, KHK, kararname, yonetmelik, teblig) but no formal API
# - Turkish legal system is based on civil law (Swiss-influenced)
# - Turkish is the sole official language for all legislation
# - Resmi Gazete (Official Gazette) references are the canonical citation format
