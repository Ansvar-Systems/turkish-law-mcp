sources:
  - name: "Mevzuat Bilgi Sistemi (Legislation Information System)"
    authority: "Cumhurbaskanligi Mevzuat Bilgi Sistemi (Presidency of the Republic of Turkey)"
    official_portal: "https://www.mevzuat.gov.tr"
    canonical_identifier: "Resmi Gazete (Official Gazette) date and number, Law number (Kanun No.)"
    retrieval_method: "HTML_SCRAPE"
    api_documentation: null
    update_frequency: "daily"
    last_ingested: "PENDING_FIRST_INGEST"
    license_or_terms:
      type: "Government Public Data"
      url: "https://www.mevzuat.gov.tr"
      summary: "mevzuat.gov.tr is the official Turkish legislation database operated by the Presidency; provides free public access to all Turkish legislation including laws (kanun), presidential decrees (cumhurbaskanligi kararnamesi), regulations (yonetmelik), and communiques (teblig); legislative texts are freely accessible as government public data"
    coverage:
      scope: "All Turkish legislation including KVKK (Kisisel Verilerin Korunmasi Kanunu, Law No. 6698), Law No. 5651 (Internet Regulation), Turk Ceza Kanunu (TCK, Criminal Code including cybercrime arts. 243-246), Turk Ticaret Kanunu (TTK, Commercial Code No. 6102), Law No. 6563 (Electronic Commerce), BTK regulations (telecommunications), and the Turkish Constitution (Turkiye Cumhuriyeti Anayasasi)"
      limitations: "No formal API available; structured HTML scraping required; some very recent amendments may have a short delay before consolidation; historical versions of laws may not always be available in consolidated form; secondary legislation (regulations, communiques) may lag behind primary legislation"
    languages:
      - "tr"

  - name: "KVKK Kurumu (Personal Data Protection Authority) Decisions and Guidance"
    authority: "Kisisel Verileri Koruma Kurumu (Turkish Personal Data Protection Authority)"
    official_portal: "https://www.kvkk.gov.tr"
    canonical_identifier: "KVKK decision reference number"
