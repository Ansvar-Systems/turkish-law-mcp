    api_documentation: null
    update_frequency: "monthly"
    last_ingested: "PENDING_FIRST_INGEST"
    license_or_terms:
      type: "Government Publication"
      url: "https://www.kvkk.gov.tr"
      summary: "KVKK decisions, guidelines, and regulatory guidance are publicly available as official government publications; the KVKK has become increasingly active in enforcement since its establishment in 2016"
    coverage:
      scope: "KVKK board decisions, guidelines on data protection implementation, sector-specific guidance, data breach notifications, and published regulatory opinions"
      limitations: "Not all historical decisions may be available digitally; some older guidance may only be in PDF format; English translations of decisions are limited"
    languages:
      - "tr"

